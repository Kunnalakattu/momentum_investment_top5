universe:
  us_equity:
    - VUSA    # S&P 500                     (Vanguard)
    - EQQQ    # Nasdaq-100                  (Invesco)
    - R2US    # Russell 2000 US small cap   (iShares)

  world_equity:
    - IWDA    # MSCI World developed        (iShares, largest AUM)
    - VWRP    # FTSE All-World incl. EM     (Vanguard, accumulating)
    - WSML    # MSCI World Small Cap        (iShares)

  regional_equity:
    - EUNK    # MSCI Europe                 (iShares)
    - HUKX    # FTSE 100 UK                 (HSBC)
    - HMXJ    # MSCI Pacific ex Japan       (HSBC)
    - IJPN    # MSCI Japan                  (iShares)
    - EIMI    # MSCI EM IMI (broadest EM)   (iShares)
    - NDIA    # MSCI India                  (iShares)
    - XCS6    # MSCI China H shares         (HSBC)
    - HMCA    # MSCI China A shares         (HSBC — different market from H)
    - HKOR    # MSCI Korea                  (HSBC)
    - HTWN    # MSCI Taiwan                 (HSBC)
    - HBRL    # MSCI Brazil                 (HSBC)
    - HCAN    # MSCI Canada                 (HSBC)
    - LTMC    # Latin America               (iShares)

  sectors:
    - QDVE    # S&P 500 IT / Technology     (iShares)
    - HEAL    # Global Healthcare           (iShares)
    - BNKS    # Global Banks                (iShares)
    - WNRG    # Global Energy               (iShares)
    - INSW    # Global Industrials          (iShares)
    - MACG    # Global Consumer Staples     (iShares)
    - QNTG    # Quantum Computing thematic  (WisdomTree)

  real_assets:
    - IWDP    # Global Property / REITs     (iShares)
    - SGLN    # Physical Gold               (iShares, largest AUM)
    - CMOD    # Broad Commodities           (iShares)

  bonds:
    - IB01    # US Treasury 0-1Y            (iShares — cash proxy / defensive)
    - AGGH    # Global Aggregate            (iShares)
    - IGLA    # Global Government Bond      (iShares)
    - LQDS    # USD Investment-Grade Corp   (iShares, GBP listing)
    - JNKS    # US High Yield               (iShares)
    - JPEA    # EM Bonds USD                (iShares)
    - LOCG    # EM Local Govt Bonds         (iShares — local currency, different from JPEA)
    - IEAC    # Euro Corporate Bond         (iShares)
    - JEUG    # Euro Government Bonds       (iShares)

  factor_esg:
    - QDIV    # MSCI USA Quality Dividend   (iShares)
    - QDVR    # MSCI USA SRI                (iShares)
    - QDVS    # MSCI EM SRI                 (iShares)

