universe:
  technology:
    - AAPL    # Apple
    - MSFT    # Microsoft
    - NVDA    # NVIDIA
    - AMZN    # Amazon
    - META    # Meta Platforms
    - GOOGL   # Alphabet
    - AVGO    # Broadcom
    - ORCL    # Oracle
    - CRM     # Salesforce
    - ADBE    # Adobe

  semiconductors:
    - AMD     # AMD
    - TSM     # Taiwan Semiconductor (ADR)
    - QCOM    # Qualcomm
    - MU      # Micron Technology
    - TXN     # Texas Instruments

  financials:
    - JPM     # JPMorgan Chase
    - BAC     # Bank of America
    - GS      # Goldman Sachs
    - MS      # Morgan Stanley
    - BLK     # BlackRock
    - V       # Visa
    - MA      # Mastercard

  healthcare:
    - LLY     # Eli Lilly
    - UNH     # UnitedHealth
    - JNJ     # Johnson & Johnson
    - ABBV    # AbbVie
    - MRK     # Merck

  consumer:
    - COST    # Costco
    - WMT     # Walmart
    - PG      # Procter & Gamble
    - KO      # Coca-Cola
    - PEP     # PepsiCo

  industrials:
    - CAT     # Caterpillar
    - GE      # GE Aerospace
    - RTX     # RTX Corporation
    - DE      # Deere & Company
    - HON     # Honeywell
    - LIN     # Linde

  energy:
    - XOM     # ExxonMobil
    - CVX     # Chevron
    - COP     # ConocoPhillips
    - SLB     # SLB (Schlumberger)
    - EOG     # EOG Resources

  communication:
    - NFLX    # Netflix
    - DIS     # Disney
    - UBER    # Uber
    - PLTR    # Palantir
    - SPOT    # Spotify
    - TMUS    # T-Mobile

  commodities:
    - NEM     # Newmont (gold mining)
    - GOLD    # Barrick Gold
    - AEM     # Agnico Eagle
    - FCX     # Freeport-McMoRan (copper)
    - SCCO    # Southern Copper
    - RIO     # Rio Tinto (ADR)
    - BHP     # BHP Group (ADR)
    - VALE    # Vale (ADR, iron ore)
    - ADM     # Archer-Daniels-Midland
    - BG      # Bunge (agriculture)
    - MOS     # Mosaic (fertilizers)
    - NTR     # Nutrien (agriculture)

  index:
    - SPY     # S&P 500 ETF (benchmark / market exposure)
    - BRK-B   # Berkshire Hathaway B

data:
  start_date: "2010-01-04"      # 2010 — most large-caps have 15+ years of history
  exchange_suffix: ""            # US stocks — no suffix needed for yfinance
  risk_free_ticker: "^IRX"      # 13-week T-bill annualised (%)
  price_col: "Close"
  raw_dir: "data/raw"
  processed_dir: "data/processed"
